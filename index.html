<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Años</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    color:white;
    background:black;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
    url('fondo.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content h1{
    font-family:'Great Vibes',cursive;
    font-size:6rem;
    margin-bottom:20px;
}

.hero-content h2{
    font-size:2rem;
    font-weight:300;
}

.scroll{
    margin-top:30px;
    font-size:1rem;
    opacity:.8;
}

.section{
    padding:80px 20px;
    text-align:center;
}

.section h2{
    font-size:3rem;
    margin-bottom:30px;
}

.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.time-box{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    min-width:120px;
}

.time-box span{
    display:block;
    font-size:3rem;
    font-weight:bold;
}

.photo{
    width:250px;
    height:250px;
    border-radius:50%;
    overflow:hidden;
    margin:40px auto;
    border:5px solid white;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    font-size:1.2rem;
    line-height:2;
}

.buttons{
    margin-top:40px;
}

.btn{
    display:inline-block;
    padding:15px 30px;
    margin:10px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    transition:.3s;
}

.maps{
    background:#4285F4;
}

.whatsapp{
    background:#25D366;
}

.btn:hover{
    transform:scale(1.05);
}

footer{
    padding:40px;
    text-align:center;
    background:#111;
}

#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:black;
    border:none;
    border-radius:50px;
    padding:10px 20px;
    cursor:pointer;
}

@media(max-width:768px){

.hero-content h1{
    font-size:4rem;
}

.hero-content h2{
    font-size:1.3rem;
}

.time-box{
    min-width:90px;
}

.time-box span{
    font-size:2rem;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<button class="music-btn" onclick="toggleMusic()">
🎵 Música
</button>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<section class="hero">

<div class="hero-content">

<h1>Valentina</h1>

<h2>Mis 15 Años</h2>

<div class="scroll">
▼ Deslizá para descubrir tu invitación ▼
</div>

</div>

</section>

<section class="section">

<div class="photo">
<img src="foto-principal.jpg">
</div>

<h2>Cuenta Regresiva</h2>

<div class="countdown">

<div class="time-box">
<span id="days">0</span>
Días
</div>

<div class="time-box">
<span id="hours">0</span>
Horas
</div>

<div class="time-box">
<span id="minutes">0</span>
Minutos
</div>

<div class="time-box">
<span id="seconds">0</span>
Segundos
</div>

</div>

</section>

<section class="section">

<h2>Te Espero</h2>

<div class="details">

📅 18 de Septiembre de 2027<br>
🕘 21:00 hs<br>
📍 Salón de Eventos<br>

</div>

<div class="buttons">

<a class="btn maps"
href="https://maps.google.com"
target="_blank">
Ver Ubicación
</a>

<a class="btn whatsapp"
href="https://wa.me/59895339615?text=Confirmo%20mi%20asistencia"
target="_blank">
Confirmar Asistencia
</a>

</div>

</section>

<footer>

✨ Gracias por acompañarme en este momento tan especial ✨

</footer>

<script>

// CONTADOR

const eventDate =
new Date("September 18, 2027 21:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const diff = eventDate-now;

document.getElementById("days").innerHTML =
Math.floor(diff/(1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((diff%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((diff%(1000*60*60))/(1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((diff%(1000*60))/1000);

},1000);

// MUSICA

const music =
document.getElementById("music");

function toggleMusic(){

if(music.paused){
music.play();
}
else{
music.pause();
}

}

// PARTICULAS

const canvas =
document.getElementById('particles');

const ctx =
canvas.getContext('2d');

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*2

});

}

function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.fillStyle=
'rgba(255,255,255,.8)';

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(
p.x,p.y,p.r,
0,Math.PI*2
);
ctx.fill();

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
