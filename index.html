<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Años</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#f8e8f0,#f4d6e8);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    max-width:900px;
    width:100%;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    font-size:3rem;
    color:#b76e79;
    margin-bottom:10px;
}

h2{
    font-weight:300;
    color:#555;
    margin-bottom:30px;
}

.photo{
    width:250px;
    height:250px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:6px solid #b76e79;
    margin-bottom:30px;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin:30px 0;
}

.box{
    background:#b76e79;
    color:white;
    width:110px;
    padding:20px 10px;
    border-radius:15px;
}

.box span{
    display:block;
    font-size:2rem;
    font-weight:bold;
}

.box small{
    font-size:0.9rem;
}

.info{
    margin-top:20px;
    color:#444;
    font-size:1.1rem;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 30px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:1.1rem;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:0.9rem;
}

@media(max-width:600px){
    h1{
        font-size:2.2rem;
    }

    .box{
        width:90px;
    }

    .box span{
        font-size:1.5rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Mis 15 Años</h1>
    <h2>Pelo Brilli Brilli</h2>

    <div class="photo">
        <img src="foto.jpeg" alt="Foto">
    </div>

    <p>Faltan...</p>

    <div class="countdown">
        <div class="box">
            <span id="days">0</span>
            <small>Días</small>
        </div>

        <div class="box">
            <span id="hours">0</span>
            <small>Horas</small>
        </div>

        <div class="box">
            <span id="minutes">0</span>
            <small>Minutos</small>
        </div>

        <div class="box">
            <span id="seconds">0</span>
            <small>Segundos</small>
        </div>
    </div>

    <div class="info">
        <p><strong>Fecha:</strong> 20 de Diciembre de 2026</p>
        <p><strong>Hora:</strong> 21:00 hs</p>
        <p><strong>Lugar:</strong> Salón de Eventos</p>
    </div>

    <a class="btn"
       href="https://wa.me/59895339615?text=Confirmo%20mi%20asistencia"
       target="_blank">
       Confirmar Asistencia
    </a>

    <div class="footer">
        ¡Te espero para compartir una noche inolvidable!
    </div>

</div>

<script>

// Fecha del evento
const eventDate = new Date("Dec 20, 2027 21:00:00").getTime();

const timer = setInterval(() => {

    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (distance % (1000 * 60 * 60))
        / (1000 * 60)
    );

    const seconds = Math.floor(
        (distance % (1000 * 60))
        / 1000
    );

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if(distance < 0){
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML =
        "<h2>¡El gran día llegó!</h2>";
    }

},1000);

</script>

</body>
</html>
